name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @school/database db:generate
      - name: Generate Next.js route type stubs
        run: |
          mkdir -p apps/web/.next/types
          cat > apps/web/.next/types/routes.d.ts << 'EOF'
          // Stub for CI — generated by Next.js when typedRoutes is enabled
          type AppRoutes = string
          type PageRoutes = never
          type LayoutRoutes = string
          type RedirectRoutes = never
          type RewriteRoutes = never
          type Routes = AppRoutes | PageRoutes | LayoutRoutes | RedirectRoutes | RewriteRoutes
          interface ParamMap {}
          export type ParamsOf<Route extends Routes> = Route extends keyof ParamMap ? ParamMap[Route] : Record<string, string>
          interface LayoutSlotMap {}
          export type { AppRoutes, PageRoutes, LayoutRoutes, RedirectRoutes, RewriteRoutes, ParamMap }
          declare global {
            interface PageProps<AppRoute extends AppRoutes = AppRoutes> {
              params: Promise<Record<string, string>>
              searchParams: Promise<Record<string, string | string[] | undefined>>
            }
            type LayoutProps<LayoutRoute extends LayoutRoutes = LayoutRoutes> = {
              params: Promise<Record<string, string>>
              children: React.ReactNode
            }
          }
          EOF
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm build
